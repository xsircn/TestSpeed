name: Cloudflare Auto Speedtest

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Download and Setup CloudflareST
        run: |
          DOWNLOAD_URL=$(curl -s https://api.github.com/repos/XIU2/CloudflareSpeedTest/releases/latest | grep "browser_download_url.*linux_amd64.tar.gz" | cut -d '"' -f 4)
          curl -L -o CloudflareST.tar.gz "$DOWNLOAD_URL"
          tar -zxf CloudflareST.tar.gz
          if [ -f "cfst" ]; then mv cfst CloudflareST; fi
          chmod +x CloudflareST

      - name: Run Speedtest
        run: |
          # 1. 测速并生成原始结果
          sudo ./CloudflareST -n 500 -t 10 -p 10 -o "full_result.csv"
          
          if [ -f "full_result.csv" ]; then
              # 2. 生成网页用的精简版 CSV (保留前10个)
              sed -n '1,11p' full_result.csv > result.csv
              
              # 3. 【新增逻辑】生成订阅格式的文本文件 (sub.txt)
              # awk 处理逻辑：跳过第一行，取第1列(IP)和第2列(端口)，拼接备注
              awk -F',' 'NR>1 && NR<=11 {print $1 ":443#US-Xsop"}' full_result.csv > api.tx
              
              echo "已生成 result.csv 和 api.txt"
          else
              exit 1
          fi

      - name: Commit and Push
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # 同时添加 csv 和 txt 文件
          git add result.csv api.txt
          
          git diff --quiet && git diff --staged --quiet || (git commit -m "自动更新优选数据: $(date)" && git push)
