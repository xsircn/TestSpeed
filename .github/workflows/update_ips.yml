- name: Run Speedtest and Identify ISP
        run: |
          # 1. 运行测速 (增加 -p 0 仅测延迟，或保持原样)
          sudo ./CloudflareST -n 500 -t 10 -p 10 -o "full_result.csv"
          
          if [ -f "full_result.csv" ]; then
              # 2. 获取表头并创建临时文件
              head -n 1 full_result.csv > result.csv
              
              # 3. 循环处理前 10 个 IP 并查询运营商
              # 我们读取测速结果的前 10 行数据
              tail -n +2 full_result.csv | head -n 10 | while IFS=, read -r line; do
                  ip=$(echo "$line" | cut -d',' -f1)
                  
                  # 通过 ip-api 获取运营商名称 (注意接口频率限制，10个IP没问题)
                  isp=$(curl -s "http://ip-api.com/json/$ip?fields=isp" | sed 's/.*"isp":"\([^"]*\)".*/\1/')
                  
                  # 将运营商信息拼接到这一行的末尾（存入 result.csv）
                  echo "$line,$isp" >> result.csv
                  
                  # 同时生成订阅用的 api 文件，把 ISP 拼在备注里
                  echo "$ip:443#$isp-Xsop" >> api
              done
              
              echo "已完成运营商识别，result.csv 预览："
              head -n 5 result.csv
          else
              echo "错误：未生成测速文件"
              exit 1
          fi
